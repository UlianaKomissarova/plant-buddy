ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ dev.uliana.ApplicationKt.module ]
    }
}

postgres {
    jdbcDriver = "org.postgresql.Driver"
    jdbcUrl = "jdbc:postgresql://localhost:5442/default"
    jdbcUrl = ${?DATABASE_URL}
    user = "username"
    user = ${?DATABASE_USER}
    password = "password"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
    minimumIdle = 2
    maxLifetime = 1800000
    idleTimeout = 600000
    connectionTimeout = 30000
}

jwt {
    secret = "your-secret-key-min-32-characters-long"
    secret = ${?JWT_SECRET}
    issuer = "plant-app"
    audience = "plant-app-users"
    accessTokenTtlMinutes = 15
    refreshTokenTtlDays = 30
}

mail {
    host = "smtp.gmail.com"
    port = 587
    username = "your@gmail.com"
    username = ${?MAIL_USERNAME}
    password = "your-app-password"
    password = ${?MAIL_PASSWORD}
    from = "your@gmail.com"
    fromName = "PlantApp"
}

swagger {
    url = "/swagger"
    title = "PlantApp API"
    version = "1.0.0"
    description = "API for plant watering reminder app"
}

server {
    url = "http://localhost:8080"
    url = ${?SERVER_URL}
}

fcm {
    serviceAccountJson = ""
    serviceAccountJson = ${?FCM_SERVICE_ACCOUNT_JSON}
}

notification {
    hourUtc = 9
    hourUtc = ${?NOTIFICATION_HOUR_UTC}
}
